name: today-open-refresh

# 초록핀(today_open) 재계산 전용 — 네이버 호출 없이 Supabase slots + 현재시각만.
# 무거운 slot-ingest와 분리해 타임아웃/차단과 무관하게 자주 돌린다.
on:
  schedule:
    - cron: "*/15 * * * *" # 15분마다 (지나간 막타임이 빠르게 회색으로)
  workflow_dispatch: {}

concurrency:
  group: today-open
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Recompute today_open
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scraper/slot_ingest.py reconcile
