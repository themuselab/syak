name: slot-ingest

on:
  schedule:
    - cron: "0 */2 * * *" # 2시간마다 (UTC) — 전국 4만곳이라 부하·차단 완화
  workflow_dispatch: {} # 수동 실행 버튼

concurrency:
  group: slot-ingest
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ingest slots → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: python scraper/slot_ingest.py
