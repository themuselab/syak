name: slot-ingest

on:
  schedule:
    - cron: "0 * * * *" # 매시 정각 → 그룹 0 (절반)
    - cron: "30 * * * *" # 매시 30분 → 그룹 1 (나머지 절반)
  workflow_dispatch: {} # 수동 (그룹 0 실행)

concurrency:
  group: slot-ingest-${{ github.event.schedule }}
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    # 스크랩(네이버)은 BUDGET_SEC=13분에 멈춤. 저장(Supabase)은 네이버 안 건드려서
    # 25분 차단선과 무관 → job 타임아웃은 저장 여유 위해 24분으로(스크랩 노출은 13분 유지).
    timeout-minutes: 24
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 시간대로 그룹(샤드) 결정
        run: |
          if [ "${{ github.event.schedule }}" = "30 * * * *" ]; then
            echo "SHARD=1" >> "$GITHUB_ENV"
          else
            echo "SHARD=0" >> "$GITHUB_ENV"
          fi
      - name: Ingest slots → Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          NUM_SHARDS: "2"
          BUDGET_SEC: "780"
        run: python scraper/slot_ingest.py
