name: event-ingest

on:
  schedule:
    - cron: "30 18 * * *" # 매일 1회 (UTC 18:30 = KST 03:30) — 할인/이벤트 갱신
  workflow_dispatch: {} # 수동 실행 버튼

concurrency:
  group: event-ingest
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 18 # 시간예산 14분 + 여유. 빠른실패라 차단돼도 안 멈춤.
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3] # 4분할 = 각 러너 다른 IP
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: "Ingest events (shard ${{ matrix.shard }}/4) → Supabase"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SHARD: ${{ matrix.shard }}
          NUM_SHARDS: "4"
          BUDGET_SEC: "840"
        run: python scraper/enrich_events.py
