<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #ffffff 0%, #fde7f1 100%);
    padding: 84px 88px; position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: center;
  }
  .logo { font-size: 58px; font-weight: 800; color: #ec4899; letter-spacing: -3px; margin-bottom: 40px; }
  .headline { font-size: 78px; font-weight: 800; color: #17171a; line-height: 1.16; letter-spacing: -3px; }
  .headline .pink { color: #ec4899; }
  .sub { font-size: 31px; color: #6b6b72; font-weight: 500; margin-top: 30px; letter-spacing: -1px; }
  .chips { display: flex; gap: 12px; margin-top: 40px; }
  .chip { background: #fff; border: 2px solid #f4c5dc; color: #ec4899; font-size: 26px; font-weight: 700; padding: 12px 24px; border-radius: 30px; }
  /* 장식: 핑크 핀 모티프 */
  .pin { position: absolute; border-radius: 50%; background: #ec4899; }
  .pin.a { width: 26px; height: 26px; right: 150px; top: 120px; opacity: .9; }
  .pin.b { width: 18px; height: 18px; right: 90px; top: 220px; opacity: .55; }
  .pin.c { width: 40px; height: 40px; right: 220px; top: 240px; opacity: .8; box-shadow: 0 8px 24px rgba(236,72,153,.4); }
  .pin.d { width: 16px; height: 16px; right: 300px; top: 150px; opacity: .4; }
  .glow { position: absolute; right: -120px; bottom: -120px; width: 460px; height: 460px; border-radius: 50%; background: radial-gradient(circle, rgba(236,72,153,.18) 0%, transparent 70%); }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="pin a"></div><div class="pin b"></div><div class="pin c"></div><div class="pin d"></div>
    <div class="logo">syak</div>
    <div class="headline"><span class="pink">내일 2시, 강남,</span><br />예약 빈 네일샵</div>
    <div class="sub">원하는 시간에 예약 가능한 뷰티샵을 지도에서 · 리뷰·가격 보고 바로 예약</div>
    <div class="chips">
      <div class="chip">시간으로 필터</div>
      <div class="chip">빈자리 매시간 갱신</div>
    </div>
  </div>
</body>
</html>
